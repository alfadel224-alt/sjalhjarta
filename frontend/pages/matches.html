<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Matchningar — Själ & Hjärta</title>
<link rel="stylesheet" href="../css/shared.css">
<style>
.matches-layout { display:grid; grid-template-columns:320px 1fr; height:calc(100vh - var(--nav-h)); padding-top:var(--nav-h); }
.matches-list { background:var(--surface); border-right:1px solid var(--glass-border); display:flex; flex-direction:column; overflow:hidden; }
.matches-header { padding:1.5rem; border-bottom:1px solid var(--glass-border); }
.matches-header h2 { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:300; margin-bottom:0.8rem; }
.search-box { display:flex; align-items:center; gap:0.6rem; background:rgba(247,245,242,0.05); border:1px solid var(--glass-border); border-radius:var(--radius-sm); padding:0.6rem 0.9rem; }
.search-box input { background:none; border:none; color:var(--snow); font-size:0.87rem; outline:none; flex:1; }
.search-box input::placeholder { color:var(--fog); }
.matches-scroll { flex:1; overflow-y:auto; padding:0.5rem; }
.match-item { display:flex; align-items:center; gap:0.9rem; padding:0.9rem; border-radius:var(--radius-sm); cursor:pointer; transition:background 0.2s; position:relative; }
.match-item:hover { background:rgba(247,245,242,0.04); }
.match-item.active { background:rgba(127,191,170,0.08); border-left:2px solid var(--aurora1); }
.match-avatar { width:46px; height:46px; border-radius:50%; background:linear-gradient(135deg,var(--aurora1),var(--aurora3)); display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; position:relative; }
.online-dot { position:absolute; bottom:1px; right:1px; width:10px; height:10px; border-radius:50%; background:var(--success); border:2px solid var(--surface); }
.match-info { flex:1; min-width:0; }
.match-name { font-size:0.92rem; font-weight:500; }
.match-preview { font-size:0.78rem; color:var(--fog); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:0.15rem; }
.match-time { font-size:0.7rem; color:var(--fog); white-space:nowrap; }
.unread-badge { background:var(--aurora1); color:var(--midnight); width:18px; height:18px; border-radius:50%; font-size:0.68rem; font-weight:600; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

/* Chat area */
.chat-area { display:flex; flex-direction:column; position:relative; z-index:2; }
.chat-header { padding:1.2rem 1.8rem; border-bottom:1px solid var(--glass-border); display:flex; align-items:center; gap:1rem; background:rgba(20,26,34,0.5); backdrop-filter:blur(16px); }
.chat-header-avatar { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,var(--aurora1),var(--aurora3)); display:flex; align-items:center; justify-content:center; font-size:1.1rem; }
.chat-header-info { flex:1; }
.chat-header-name { font-size:1rem; font-weight:500; }
.chat-header-status { font-size:0.75rem; color:var(--aurora1); }
.chat-score { font-size:0.78rem; color:var(--fog); }
.chat-messages { flex:1; overflow-y:auto; padding:1.5rem 2rem; display:flex; flex-direction:column; gap:0.8rem; }
.msg { display:flex; gap:0.7rem; align-items:flex-end; }
.msg.mine { flex-direction:row-reverse; }
.msg-av { width:30px; height:30px; border-radius:50%; background:var(--glass); border:1px solid var(--glass-border); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:0.8rem; }
.msg-bubble { background:var(--surface2); border:1px solid var(--glass-border); border-radius:18px; padding:0.7rem 1rem; font-size:0.9rem; line-height:1.5; max-width:65%; }
.msg.mine .msg-bubble { background:linear-gradient(135deg,rgba(127,191,170,0.18),rgba(168,196,212,0.18)); border-color:rgba(127,191,170,0.25); border-bottom-right-radius:4px; }
.msg-bubble.received { border-bottom-left-radius:4px; }
.msg-time { font-size:0.67rem; color:var(--fog); margin-top:0.2rem; text-align:right; }
.chat-input-bar { padding:1rem 1.5rem; border-top:1px solid var(--glass-border); display:flex; gap:0.8rem; align-items:center; background:rgba(20,26,34,0.5); }
.chat-input { flex:1; background:rgba(247,245,242,0.05); border:1px solid var(--glass-border); border-radius:100px; padding:0.75rem 1.2rem; color:var(--snow); font-size:0.9rem; outline:none; transition:border-color 0.3s; }
.chat-input:focus { border-color:rgba(127,191,170,0.4); }
.send-btn { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,var(--aurora1),var(--aurora2)); border:none; cursor:pointer; color:var(--midnight); font-size:1rem; display:flex; align-items:center; justify-content:center; transition:transform 0.3s,box-shadow 0.3s; flex-shrink:0; }
.send-btn:hover { transform:scale(1.08); box-shadow:0 6px 20px rgba(127,191,170,0.4); }
.ai-suggest { padding:0.6rem 1.5rem; border-bottom:1px solid var(--glass-border); display:flex; align-items:center; gap:0.6rem; }
.ai-suggest-btn { background:rgba(127,191,170,0.08); border:1px solid rgba(127,191,170,0.2); border-radius:100px; padding:0.3rem 0.8rem; font-size:0.75rem; color:var(--aurora1); cursor:pointer; transition:all 0.3s; white-space:nowrap; }
.ai-suggest-btn:hover { background:rgba(127,191,170,0.18); }

.no-match-selected { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--fog); gap:1rem; }
.no-match-selected span { font-size:4rem; }

.new-matches { padding:0.8rem 1rem 0; }
.new-matches-title { font-size:0.75rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--fog); margin-bottom:0.7rem; }
.new-matches-scroll { display:flex; gap:0.7rem; overflow-x:auto; padding-bottom:0.5rem; }
.new-match-bubble { flex-shrink:0; text-align:center; cursor:pointer; }
.nm-avatar { width:54px; height:54px; border-radius:50%; background:linear-gradient(135deg,var(--aurora1),var(--aurora3)); display:flex; align-items:center; justify-content:center; font-size:1.3rem; border:2px solid var(--aurora1); margin:0 auto 0.3rem; transition:transform 0.3s; }
.nm-avatar:hover { transform:scale(1.08); }
.nm-name { font-size:0.7rem; color:var(--fog); }

@media(max-width:768px){ .matches-layout{grid-template-columns:1fr} .matches-list{height:auto;max-height:35vh} }
</style>
</head>
<body>
<div class="aurora"><span></span><span></span><span></span></div>

<nav class="nav z2">
  <a class="nav-logo" href="../index.html">Själ <em>&</em> Hjärta</a>
  <ul class="nav-links">
    <li><a href="app.html">Upptäck</a></li>
    <li><a href="matches.html" class="active">Matchningar</a></li>
    <li><a href="profile.html">Profil</a></li>
    <li><a href="pricing.html">Uppgradera</a></li>
  </ul>
  <div class="nav-user">
    <div class="nav-avatar" id="nav-avatar" onclick="window.location='profile.html'"></div>
    <button class="btn btn-ghost btn-sm" data-action="logout">Logga ut</button>
  </div>
</nav>

<div class="matches-layout">
  <!-- MATCHES LIST -->
  <div class="matches-list">
    <div class="matches-header">
      <h2>Matchningar <span id="match-badge" class="badge badge-aurora" style="font-size:0.7rem"></span></h2>
      <div class="search-box">
        <span style="color:var(--fog);font-size:0.9rem">🔍</span>
        <input id="search-input" placeholder="Sök matchningar..." oninput="filterMatches(this.value)">
      </div>
    </div>
    <div class="new-matches">
      <div class="new-matches-title">Nya matchningar</div>
      <div class="new-matches-scroll" id="new-matches-scroll">
        <div style="font-size:0.8rem;color:var(--fog);padding:0.5rem">Laddar...</div>
      </div>
    </div>
    <div class="matches-scroll" id="matches-scroll">
      <div style="padding:2rem;text-align:center;color:var(--fog);font-size:0.85rem">Laddar matchningar...</div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chat-area">
    <div class="no-match-selected" id="no-match">
      <span>💬</span>
      <div style="font-family:'Cormorant Garamond',serif;font-size:1.4rem">Välj en matchning</div>
      <p style="font-size:0.87rem;max-width:300px;text-align:center;line-height:1.6">Klicka på en matchning till vänster för att börja chatta.</p>
    </div>
    <div id="chat-view" style="display:none;flex-direction:column;height:100%">
      <div class="chat-header">
        <div class="chat-header-avatar" id="ch-avatar">?</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="ch-name"></div>
          <div class="chat-header-status" id="ch-status"></div>
        </div>
        <div class="chat-score" id="ch-score"></div>
        <button class="btn btn-ghost btn-sm" onclick="getSuggestion()">✨ AI-förslag</button>
      </div>
      <div class="ai-suggest" id="ai-suggest-bar" style="display:none">
        <span style="font-size:0.75rem;color:var(--fog)">Stella föreslår:</span>
        <div id="ai-suggestions"></div>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-bar">
        <input class="chat-input" id="chat-input" placeholder="Skriv ett meddelande..." onkeydown="if(event.key==='Enter')sendMessage()">
        <button class="send-btn" onclick="sendMessage()">→</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"><div class="toast-icon"></div><div><div class="toast-title"></div><div class="toast-desc"></div></div></div>

<script src="../js/api.js"></script>
<script>
requireAuth(); initNav();
let matches=[], currentMatch=null, pollInterval=null;

const EMOJIS=['🌲','❄️','🌊','🏔️','🌙','🌿'];

async function loadMatches(){
  try{
    const data=await get('/matches');
    matches=data;
    document.getElementById('match-badge').textContent=matches.length;
    renderMatchList(matches);
    renderNewMatches();
  }catch(e){ console.error(e); }
}

function renderMatchList(list){
  const el=document.getElementById('matches-scroll');
  if(!list.length){ el.innerHTML=`<div style="padding:2rem;text-align:center;color:var(--fog);font-size:0.85rem">Inga matchningar ännu.<br><a href="app.html" style="color:var(--aurora1)">Hitta din match →</a></div>`; return; }
  el.innerHTML=list.map(m=>`
    <div class="match-item ${currentMatch?.id===m.id?'active':''}" onclick="openChat('${m.id}')">
      <div class="match-avatar">${EMOJIS[matches.indexOf(m)%EMOJIS.length]}</div>
      <div class="match-info">
        <div class="match-name">${m.first_name}, ${m.age}</div>
        <div class="match-preview">${m.last_message||'Ny matchning! Säg hej 👋'}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.4rem">
        <div class="match-time">${m.matched_at?timeAgo(m.matched_at):''}</div>
        ${m.unread_count>0?`<div class="unread-badge">${m.unread_count}</div>`:''}
      </div>
    </div>
  `).join('');
}

function renderNewMatches(){
  const el=document.getElementById('new-matches-scroll');
  const recent=matches.filter(m=>!m.last_message).slice(0,8);
  if(!recent.length){ el.innerHTML=`<div style="font-size:0.8rem;color:var(--fog);padding:0.5rem">Börja gilla profiler för matchningar!</div>`; return; }
  el.innerHTML=recent.map((m,i)=>`
    <div class="new-match-bubble" onclick="openChat('${m.id}')">
      <div class="nm-avatar">${EMOJIS[i%EMOJIS.length]}</div>
      <div class="nm-name">${m.first_name}</div>
    </div>
  `).join('');
}

function filterMatches(q){
  const filtered=matches.filter(m=>m.first_name.toLowerCase().includes(q.toLowerCase()));
  renderMatchList(filtered);
}

async function openChat(matchId){
  currentMatch=matches.find(m=>m.id===matchId);
  if(!currentMatch) return;
  document.getElementById('no-match').style.display='none';
  const cv=document.getElementById('chat-view'); cv.style.display='flex';
  document.getElementById('ch-name').textContent=`${currentMatch.first_name}, ${currentMatch.age}`;
  document.getElementById('ch-avatar').textContent=EMOJIS[matches.indexOf(currentMatch)%EMOJIS.length];
  document.getElementById('ch-status').textContent=`Matchade ${timeAgo(currentMatch.matched_at)}`;
  document.getElementById('ch-score').textContent=currentMatch.ai_score?`✦ ${Math.round(currentMatch.ai_score*100)}% kompatibilitet`:'';
  document.getElementById('ai-suggest-bar').style.display='none';
  renderMatchList(matches);
  await loadMessages();
  if(pollInterval) clearInterval(pollInterval);
  pollInterval=setInterval(loadMessages,5000);
}

async function loadMessages(){
  if(!currentMatch) return;
  try{
    const msgs=await get(`/matches/${currentMatch.id}/messages`);
    const me=Auth.getUser();
    const box=document.getElementById('chat-messages');
    const atBottom=box.scrollHeight-box.clientHeight<=box.scrollTop+50;
    box.innerHTML=msgs.map(m=>`
      <div class="msg ${m.sender_id===me.id?'mine':''}">
        ${m.sender_id!==me.id?`<div class="msg-av">${EMOJIS[0]}</div>`:''}
        <div>
          <div class="msg-bubble ${m.sender_id!==me.id?'received':''}">${m.content}</div>
          <div class="msg-time">${timeAgo(m.created_at)}</div>
        </div>
      </div>
    `).join('') || `<div style="text-align:center;padding:3rem;color:var(--fog);font-size:0.87rem">Ni matchade! Säg hej till ${currentMatch.first_name} 👋</div>`;
    if(atBottom) box.scrollTop=box.scrollHeight;
  }catch{}
}

async function sendMessage(){
  const inp=document.getElementById('chat-input');
  const msg=inp.value.trim(); if(!msg||!currentMatch) return;
  inp.value='';
  try{ await post(`/matches/${currentMatch.id}/messages`,{content:msg}); await loadMessages(); } catch(e){ toast('❌','Fel',e.message); }
}

async function getSuggestion(){
  const bar=document.getElementById('ai-suggest-bar');
  const sugsEl=document.getElementById('ai-suggestions');
  sugsEl.innerHTML='<span style="color:var(--fog);font-size:0.78rem">Stella tänker...</span>';
  bar.style.display='flex';
  try{
    const r=await post('/ai/message-suggestion',{partner_profile:{first_name:currentMatch.first_name,age:currentMatch.age}});
    sugsEl.innerHTML=r.suggestions.map(s=>`<button class="ai-suggest-btn" onclick="useMsg('${s.text.replace(/'/g,"\\'")}')">${s.style}: ${s.text.substring(0,40)}...</button>`).join('');
  }catch{ sugsEl.innerHTML='<span style="color:var(--fog);font-size:0.78rem">Kunde inte hämta förslag.</span>'; }
}

function useMsg(text){ document.getElementById('chat-input').value=text; document.getElementById('ai-suggest-bar').style.display='none'; }

async function initUser(){
  try{ const me=await get('/auth/me'); document.getElementById('nav-avatar').textContent=(me.first_name||me.email)[0].toUpperCase(); }catch{}
}

initUser(); loadMatches();
</script>
</body>
</html>
